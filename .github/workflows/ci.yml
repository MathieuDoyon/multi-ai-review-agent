name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm validate:packaging

      - run: pnpm test:run

      - run: pnpm build

      - name: Check committed CLI bundle is up to date
        run: |
          if ! git diff --exit-code skills/multi-ai-review-agent/scripts/cli.mjs; then
            echo "::error::skills/multi-ai-review-agent/scripts/cli.mjs is stale — run 'pnpm build' and commit the result."
            exit 1
          fi

      - name: Validate Claude Code plugin manifests
        run: npx --yes @anthropic-ai/claude-code@latest plugin validate .
