name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test:run

      - run: pnpm build

      - name: Check committed CLI bundle is up to date
        run: git diff --exit-code skills/multi-ai-review-agent/scripts/cli.mjs

      - name: Check tag matches plugin version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match .claude-plugin/plugin.json version $VERSION."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
